strictEngines = true

[install]
# Supply-chain cooldown (admission-time): refuse npm versions published less than
# 3 days ago, to dodge freshly-published malware. Unit = SECONDS (259200 = 3 days).
# Own-org packages (@inkeep/*) are exempt. NOTE: bun's exclude key is PLURAL
# (minimumReleaseAgeExcludes); pnpm's is singular (minimumReleaseAgeExclude).
# bun 1.3.13 does not match the scope glob for freshly published packages —
# resolution of a <3-day-old @inkeep package fails despite the wildcard — so
# newly introduced own-org packages also need an exact-name entry until the
# cooldown window passes (or the glob bug is fixed upstream).
minimumReleaseAge = 259200
minimumReleaseAgeExcludes = [
  "@inkeep/*",
  "@inkeep/mermaid-wysiwyg-core",
  "@inkeep/mermaid-wysiwyg-dom",
]
