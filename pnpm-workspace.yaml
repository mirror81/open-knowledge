packages:
  - 'packages/*'
  - 'docs'

# Supply-chain cooldown (admission-time): refuse npm versions published less
# than 3 days ago, to dodge freshly-published malware. Unit = MINUTES
# (4320 = 3 days). Own-org packages (@inkeep/*) are exempt. This replaces the
# retired bunfig.toml posture (which expressed the same window in seconds:
# minimumReleaseAge = 259200). Emergency reproduction escape hatch (bypass the
# cooldown for a single install): `pnpm install --config.minimum-release-age=0`.
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - '@inkeep/*'
  - '@visimer/*'

# Patch application failures fail the install CLOSED (never silently skipped) —
# the markdown pipeline depends on the pinned/patched remark-prosemirror hunks.
ignorePatchFailures: false

# Dependency build scripts are blocked by default under pnpm; only these run.
# electron downloads its platform binary in a postinstall. The napi native addon
# (@inkeep/open-knowledge-native-config) builds via its own turbo `napi build`
# task, not a dependency install script, so it needs no entry here. node-pty ships
# prebuilds for darwin + win32 only — no Linux prebuild — so on Linux its install
# script must run to compile pty.node from source, or the Node-runtime pty tests
# can't load the native module (darwin/win32 resolve the shipped prebuild, no build).
onlyBuiltDependencies:
  - electron
  - node-pty

overrides:
  mdast-util-mdx-jsx: 3.2.0
  # Dedup @types/node to a single major so a frozen install resolves node's
  # ambient types consistently. Workspace packages declare @types/node at both
  # ^24.7.0 and ^25.6.0; a fresh frozen resolution otherwise lands a skew where
  # ChildProcess and its EventEmitter base come from different @types/node
  # versions and don't merge, so `child.on(...)` fails to typecheck in the
  # server src the app checks via the `development` condition (green under bun's
  # flat dedup, red under pnpm's strict tree). Pin to the 24.x line the CLI ships.
  "@types/node": ^24.7.0
  # Editor stack pinned to the versions the bun lockfile resolved. The app
  # declares the TipTap suite at `^3.22.3`; a fresh pnpm resolution floats the
  # whole suite to 3.27.3 (and its bundled ProseMirror to model 1.25.11 / view
  # 1.42.1), and the newer `@tiptap/extension-list-keymap` join logic changes
  # editor merge behavior (regresses list-boundary-merge and sibling suites).
  # This toolchain cutover must be behavior-preserving, so the runtime editor
  # graph is held at the bun baseline. Revisit as a deliberate, separately-tested
  # upgrade — not as a side effect of the package-manager swap.
  prosemirror-model: 1.25.4
  prosemirror-view: 1.41.8
  # CodeMirror is the source-mode editor core, held at the same bun baseline as
  # the ProseMirror/TipTap graph above; a fresh pnpm resolution otherwise floats
  # it within the app's `^6.6.0`/`^6.43.3` carets (view 6.43.6 / state 6.7.1).
  '@codemirror/state': 6.6.0
  '@codemirror/view': 6.43.3
  # React + the lite-YouTube facade also floated past the bun baseline; the
  # newer React patch shifts effect/polling scheduling (breaking timing-sensitive
  # DOM tests) and lite-youtube 3.6 changed its eager-iframe fallback heuristic.
  react: 19.2.5
  react-dom: 19.2.5
  react-lite-youtube-embed: 3.5.1
  '@tiptap/core': 3.22.3
  '@tiptap/pm': 3.22.4
  '@tiptap/react': 3.22.3
